<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Site</title>
</head>
<body>
    <header>
        <img src="https://play-lh.googleusercontent.com/Fro4e_osoDhhrjgiZ_Y2C5FNXBMWvrb4rGpmkM1PDAcUPXeiAlPCq7NeaT4Q6NRUxRqo" alt="main logo">

        <nav>
            <select name="language">
                <option value="1">deu</option>
                <option value="2">eng</option>
            </select>
            <button class="button">Button 1</button>
            <button class="button">Button 2</button>
        </nav>
    </header>

    
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="container">
            <h1>Name of Company</h1>
            <h2>Subtext</h2>
            <div class="hero-buttons">
                <button>Botton to calculate</button>
                <button>Button to contact</button>
                
            </div>
            
        </div>
    </section>
        

    <section class="trust">
        <div class="container">
            <div class="block">100</div>
            <div class="block border-rigt border-left">180</div>
            <div class="block border-rigt">170</div>
            <div class="block">160</div>
        </div>
    </section>

    <section class="reviews">
        <div class="container">

            <h2>Reviews Title</h2>

            <div class="reviews-blocks">
                <div class="review"></div>
                <div class="review"></div>
                <div class="review"></div>
                <div class="review"></div>
                <div class="review"></div>
            </div>
            

        </div>
    </section>


    <section class="calculation">

        <div class="container">

            <h2>Calculation Title</h2>

            <div class="calculation-block">

                <form>
                    <label for="square">Enter a square</label>
                    <input type="number" class="square" id="square" placeholder="10">
                </form>
                <form>
                    <label for="square">Сhoose material</label>
                    <select name="material" class="material" id="material">
                        <option value="150">Regular</option>
                        <option value="200">Rock</option>
                        <option value="50">Plastic</option>
                    </select>
                </form>
                    <button class="calc-button" >Calculate</button>
                <div class="price-blcok">
                    <h3>Price: <span class="price-answer">0 Fr</span> </h3>
                </div>

            </div>

        </div>

    </section>
    
    
    <footer>

        <h4>Site 2026</h4>

    </footer>

    <script src="app.js"></script>
</body>
</html>
